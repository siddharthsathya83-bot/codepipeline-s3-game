AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Children's Story Generator Infrastructure

Parameters:
  EnvName:
    Type: String
    Default: dev
    Description: Environment name (dev/test/prod)

Resources:
  # 1. DynamoDB Table
  StoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "story-table-${EnvName}"
      AttributeDefinitions:
        - AttributeName: uid
          AttributeType: S
      KeySchema:
        - AttributeName: uid
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # 2. S3 Bucket for Stories
  StoryBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "story-storage-${EnvName}-${AWS::AccountId}"

  # 3. Lambda Function
  StoryGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda_function.lambda_handler
      Runtime: python3.11
      CodeUri: ./
      MemorySize: 128
      Timeout: 30
      Environment:
        Variables:
          BUCKET_NAME: !Ref StoryBucket
          TABLE_NAME: !Ref StoryTable
      Policies:
        - S3WritePolicy:
            BucketName: !Ref StoryBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref StoryTable
        - Statement:
            - Effect: Allow
              Action: "bedrock:InvokeModel"
              Resource: "arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-pro-v1:0"

Outputs:
  BucketName:
    Value: !Ref StoryBucket

  TableName:
    Value: !Ref StoryTable